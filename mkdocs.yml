# Theme configuration
theme:
  name: material
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  - social   # requires `pip install "mkdocs-material[imaging]"` plus the system cairo lib

# Exclude image prompt files, TODOs, and other non-publishable markdown
# from the search index, sitemap, and build. Uses MkDocs' built-in
# `exclude_docs` config (gitignore-style patterns) — preferred over the
# third-party `mkdocs-exclude` plugin, which is broken on current mkdocs.
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/TODO.md
  img/cover-image-prompt.md

# Hooks — loaded as raw Python modules, not plugins (avoids name collisions).
# `plugins/social_override.py` rewrites the og:image / twitter:image tags
# emitted by the `social` plugin above so that pages with an `image:`
# frontmatter field use the declared cover image instead of the
# auto-generated social card under /assets/images/social/.
hooks:
  - plugins/social_override.py

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

# Custom CSS
extra_css:
  - css/extra.css
  - css/mascot.css

# Custom JavaScript
extra_javascript:
  - js/extra.js

# Extra
extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dmccreary/cybersecurity

